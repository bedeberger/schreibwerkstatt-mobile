<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Schreibwerkstatt Editor</title>
  <style>
    /* Das OTA-Bundle wird ohne den globalen base.css-Reset des Mutterprojekts
       geladen (steht nicht in dessen CSS_FILES), daher gilt im WebView der
       CSS-Default box-sizing:content-box. Der Focus-Container nutzt aber
       width:100% PLUS padding-left/right (focus-mode.css) → die Box wird breiter
       als der Viewport und ragt rechts hinaus, wo das overflow-x:hidden unten
       genau das rechte Padding samt letztem Zeichen abschneidet. Das Bundle ist
       gegen border-box gebaut (base.css erzwingt es auf Web/Mac); hier stellen
       wir diese Annahme wieder her. */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--color-bg, #fff); }
    #mount { height: 100%; }
    /* Kein horizontaler Überlauf an der Wurzel: sonst kann ein zu breites
       Kind (langes Wort/Link, Tabelle) den Inhalt unter den Viewport-Rand
       schieben, wo das letzte Zeichen abgeschnitten wird. */
    html, body, #mount { overflow-x: hidden; max-width: 100%; }
    /* Defensiver Umbruch unabhängig von der (per OTA geladenen) Bundle-
       Version: lange Tokens ohne Whitespace brechen im Editor-Container statt
       horizontal zu overflowen. `!important`, weil das Bundle-CSS nach diesem
       <style> injiziert wird. `pre`/`code` behalten ihren `white-space` —
       wir setzen nur overflow-wrap, nicht white-space. */
    .focus-editor__content,
    .focus-editor__content * {
      overflow-wrap: anywhere !important;
      word-break: normal;
    }
    /* Trennlinie (<hr>, Android-Toolbar `insertHr`). Das Bundle-CSS
       (focus-mode.css `.focus-editor__content hr { border:none; height:0 }`)
       neutralisiert <hr> für Web/Mac und macht es damit unsichtbar — es wird
       NACH diesem <style> injiziert, also hier mit `!important` zurückholen.
       Sichtbare Linie über die volle Schreibbreite, themefähig. */
    .focus-editor__content hr {
      border: none !important;
      border-top: 1px solid var(--color-border, rgba(0, 0, 0, 0.2)) !important;
      height: 0 !important;
      margin: 1em 0 !important;
    }
    /* Checkbox-Listen (Android-Toolbar `insertChecklist`). Markup:
       <ul class="todo"><li class="todo-item"><input type=checkbox>
         <span class="todo-text">…</span></li></ul>
       Das Bundle liefert dieses CSS nicht mit (page-view.css steht nicht in
       CSS_FILES und ist auf `.page-content-view` gescoped, nicht auf den
       Focus-Container) — daher hier app-eigen, auf `.focus-editor__content`
       gescoped. Touch-Grössen direkt (Mobile-only). */
    .focus-editor__content ul.todo {
      list-style: none; padding-left: 0; margin: 0.4em 0;
    }
    .focus-editor__content ul.todo > li.todo-item {
      display: flex; align-items: flex-start; gap: 0.6em; margin: 0.35em 0;
    }
    .focus-editor__content ul.todo > li.todo-item > input[type="checkbox"] {
      width: 1.4em; height: 1.4em; margin-top: calc((1lh - 1.4em) / 2);
      accent-color: var(--color-primary, #4b6); cursor: pointer; flex: 0 0 auto;
    }
    .focus-editor__content ul.todo > li.todo-item > .todo-text {
      flex: 1 1 auto; min-width: 0;
    }
    .focus-editor__content ul.todo > li.todo-item > input[type="checkbox"]:checked + .todo-text {
      text-decoration: line-through; color: var(--color-muted, #999);
    }
    .sw-boot-error {
      font: 15px/1.5 system-ui, sans-serif; color: #b00020; padding: 24px;
    }
  </style>
</head>
<body>
  <div id="mount"></div>

  <script>
    // Theme synchron beim Boot setzen — der Editor-Kern reagiert auf
    // <html data-theme="dark"> (Token-CSS `:root[data-theme="dark"]`), NICHT auf
    // eine prefers-color-scheme-Media-Query. Wert kommt vom nativen Host
    // (SWHost.prefersDark(), folgt isSystemInDarkTheme). Vor injectCss(), damit
    // kein Hell-Flash entsteht.
    (function () {
      try {
        const dark = window.SWHost && window.SWHost.prefersDark && window.SWHost.prefersDark();
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        if (dark) document.documentElement.style.background = '#1a1f3a';
      } catch (e) { /* nicht-fatal: Editor läuft im Hell-Default weiter */ }
    })();

    // Promise-Registry für die native Bridge. Die @JavascriptInterface-Methoden
    // (window.SWHost) sind synchrone Java-Calls; das eigentliche Ergebnis löst
    // die native Seite asynchron über window.__sw.resolve/reject ein
    // (via evaluateJavascript).
    (function () {
      const pending = new Map();
      let seq = 0;

      // --- Block-Formatierung (native Android-Toolbar ruft window.__sw.insertHr /
      // insertChecklist; Checkbox-Toggle + Enter-Handling via delegierte Listener
      // unten). Alles app-eigen in host.html — nicht im OTA-Bundle, also nur im
      // Android-Client sichtbar. Einfügen dispatcht `input` → die Standalone-
      // Engine markiert dirty + autosaved über die Bridge/ContentRepository. ---
      const activeEditor = () =>
        document.querySelector('.focus-editor.is-active .focus-editor__content')
          || document.querySelector('.focus-editor__content');

      // Oberster Block-Vorfahr des Carets innerhalb des Editor-Containers.
      function currentBlock(el) {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;
        let node = sel.getRangeAt(0).startContainer;
        if (!el.contains(node)) return null;
        if (node.nodeType === 3) node = node.parentNode;
        while (node && node.parentNode && node.parentNode !== el) node = node.parentNode;
        return node && node !== el && el.contains(node) ? node : null;
      }

      function placeCaret(node) {
        const sel = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      // Ein leeres Checkbox-Item (Markup identisch zum Notebook-Editor).
      function makeTodoItem() {
        const li = document.createElement('li');
        li.className = 'todo-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        const span = document.createElement('span');
        span.className = 'todo-text';
        span.appendChild(document.createElement('br'));
        li.appendChild(cb);
        li.appendChild(span);
        return { li, span };
      }

      window.__sw = {
        nextId() { return 'r' + (++seq); },
        track(id) {
          return new Promise((resolve, reject) => pending.set(id, { resolve, reject }));
        },
        resolve(id, json) {
          const p = pending.get(id); if (!p) return; pending.delete(id);
          try { p.resolve(json ? JSON.parse(json) : null); }
          catch (e) { p.reject(e); }
        },
        reject(id, msg) {
          const p = pending.get(id); if (!p) return; pending.delete(id);
          p.reject(new Error(msg || 'bridge error'));
        },
        // Von der nativen Diktat-Schicht aufgerufen: Text am Cursor der aktiven
        // Focus-Seite einfügen.
        insertText(text) {
          try {
            const el = document.querySelector('.focus-editor.is-active .focus-editor__content')
              || document.querySelector('.focus-editor__content');
            if (!el) return;
            el.focus();
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) {
              el.appendChild(document.createTextNode(text));
            } else {
              const range = sel.getRangeAt(0);
              range.deleteContents();
              const node = document.createTextNode(text);
              range.insertNode(node);
              range.setStartAfter(node); range.setEndAfter(node);
              sel.removeAllRanges(); sel.addRange(range);
            }
            el.dispatchEvent(new InputEvent('input', { bubbles: true }));
          } catch (e) { /* nicht-fatal */ }
        },
        // Trennlinie (<hr>) hinter dem aktuellen Block einfügen + Schreib-Slot
        // (<p>) dahinter. <hr> übersteht den Server-Cleaner (_STRUCTURAL_LEAF).
        insertHr() {
          try {
            const el = activeEditor();
            if (!el) return;
            el.focus();
            const hr = document.createElement('hr');
            const p = document.createElement('p');
            p.appendChild(document.createElement('br'));
            const block = currentBlock(el);
            if (block) {
              block.insertAdjacentElement('afterend', hr);
            } else {
              el.appendChild(hr);
            }
            hr.insertAdjacentElement('afterend', p);
            placeCaret(p);
            el.dispatchEvent(new InputEvent('input', { bubbles: true }));
          } catch (e) { /* nicht-fatal */ }
        },
        // Checkbox-Liste einfügen. Leeren aktuellen Block ersetzen, sonst dahinter
        // anhängen. Caret landet im Text-Slot des ersten Items.
        insertChecklist() {
          try {
            const el = activeEditor();
            if (!el) return;
            el.focus();
            const ul = document.createElement('ul');
            ul.className = 'todo';
            const { li, span } = makeTodoItem();
            ul.appendChild(li);
            const block = currentBlock(el);
            if (block && !block.textContent.trim()) {
              block.parentNode.replaceChild(ul, block);
            } else if (block) {
              block.insertAdjacentElement('afterend', ul);
            } else {
              el.appendChild(ul);
            }
            placeCaret(span);
            el.dispatchEvent(new InputEvent('input', { bubbles: true }));
          } catch (e) { /* nicht-fatal */ }
        },
        // Seite ohne Speichern austauschen (native Navigation).
        setPage(json) {
          try { window.__swHandle?.setPage(json ? JSON.parse(json) : null); }
          catch (e) {}
        },
        setGranularity(g) { try { window.__swHandle?.setGranularity(g); } catch (e) {} },
        async save() { try { await window.__swHandle?.save(); } catch (e) {} },
      };

      // Checkbox-Toggle: nach dem nativen Klick-Toggle das `checked`-ATTRIBUT
      // spiegeln (nur das landet in innerHTML/Save; die `.checked`-Property tut
      // es nicht). Bubbling-Phase, damit der native Toggle schon angewandt ist.
      document.addEventListener('click', (e) => {
        const t = e.target;
        if (!t || t.tagName !== 'INPUT' || t.type !== 'checkbox') return;
        if (!t.closest('li.todo-item')) return;
        if (t.checked) t.setAttribute('checked', '');
        else t.removeAttribute('checked');
        const el = activeEditor();
        if (el) el.dispatchEvent(new InputEvent('input', { bubbles: true }));
      }, false);

      // Enter im Checkbox-Item: neues Item dahinter; leeres Item → Liste verlassen.
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' || e.shiftKey || e.isComposing) return;
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return;
        let node = sel.getRangeAt(0).startContainer;
        if (node.nodeType === 3) node = node.parentNode;
        const li = node && node.closest ? node.closest('li.todo-item') : null;
        if (!li) return;
        const ul = li.parentNode;
        e.preventDefault();
        const span = li.querySelector('.todo-text');
        if (!span || !span.textContent.trim()) {
          // Leeres Item → aus der Liste raus in einen frischen Absatz.
          const p = document.createElement('p');
          p.appendChild(document.createElement('br'));
          ul.insertAdjacentElement('afterend', p);
          li.remove();
          if (ul && !ul.querySelector('li')) ul.remove();
          placeCaret(p);
        } else {
          const next = makeTodoItem();
          li.insertAdjacentElement('afterend', next.li);
          placeCaret(next.span);
        }
        const el = activeEditor();
        if (el) el.dispatchEvent(new InputEvent('input', { bubbles: true }));
      }, false);
    })();

    function bootError(msg) {
      document.getElementById('mount').innerHTML =
        '<div class="sw-boot-error">Editor konnte nicht geladen werden:<br>' +
        String(msg).replace(/</g, '&lt;') + '</div>';
      try { window.SWHost && window.SWHost.notifyError(String(msg)); } catch (e) {}
    }

    // CSS-Closure aus dem Bundle-Manifest laden und injizieren (gleiche Reihenfolge
    // wie der Server-Builder, CSS_FILES). Robust gegen Drift: keine fixe Liste hier.
    async function injectCss() {
      try {
        const manifest = await fetch('./bundle-manifest.json').then(r => r.json());
        for (const href of (manifest.cssFiles || [])) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = './' + href;
          document.head.appendChild(link);
        }
      } catch (e) { /* CSS optional — Editor läuft auch ohne Styles */ }
    }

    // Bridge, die der Editor-Kern erwartet (siehe focus/standalone.js):
    //   loadPage(): Promise<{ id, name, html }>
    //   savePage({ id, name, html }): Promise<any>
    const bridge = {
      granularity: 'paragraph',
      typewriterAnchor: 0.5,
      loadPage() {
        if (!window.SWHost) return Promise.reject(new Error('SWHost fehlt'));
        const id = window.__sw.nextId();
        const p = window.__sw.track(id);
        window.SWHost.loadPage(id);
        return p;
      },
      savePage(page) {
        if (!window.SWHost) return Promise.reject(new Error('SWHost fehlt'));
        const id = window.__sw.nextId();
        const p = window.__sw.track(id);
        window.SWHost.savePage(id, JSON.stringify(page || {}));
        return p;
      },
    };

    (async function boot() {
      try {
        await injectCss();
        const mod = await import('./js/editor/focus/standalone.js');
        const handle = await mod.mountStandaloneFocus({
          mount: document.getElementById('mount'),
          bridge,
        });
        window.__swHandle = handle;
        try { window.SWHost && window.SWHost.onReady(); } catch (e) {}
      } catch (e) {
        bootError(e && e.stack || e);
      }
    })();
  </script>
</body>
</html>
