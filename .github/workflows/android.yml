name: Android CI

on:
  push:
    branches: [main]
  pull_request:

# Laufende Builds eines Branch/PR abbrechen, wenn neue Commits kommen.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compile-Target ist JDK 17 (siehe CLAUDE.md / build.gradle.kts).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pflicht-Check des Projekts: Debug-APK muss bauen.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Lint
        run: ./gradlew lint --stacktrace

      # Berichte (Test/Lint) bei Fehlschlag mitnehmen — erleichtert die Diagnose.
      - name: Upload reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
